[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pokebench"
version = "0.1.0"
description = "Benchmark runner for poke-battles agents"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "poke-battles" }]
keywords = ["pokemon", "showdown", "benchmark", "eval"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Games/Entertainment",
]

dependencies = [
    "pokeapi>=0.1.0",
    "pokellm>=0.1.0",
]

[project.scripts]
pokebench = "pokebench.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pokebench"]
