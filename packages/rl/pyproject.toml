[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pokerl"
version = "0.1.0"
description = "Reinforcement learning training for poke-battles agents"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "poke-battles" }]
keywords = ["pokemon", "showdown", "reinforcement-learning", "ppo"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Games/Entertainment",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "numpy>=1.26",
    "pokecore>=0.1.0",
    "pokeengine>=0.1.0",
]

[project.optional-dependencies]
train = [
    "torch>=2.2",
    "stable-baselines3>=2.3",
    "sb3-contrib>=2.3",
    "gymnasium>=0.29",
    "tensorboard>=2.16",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.5",
]

[project.scripts]
pokerl-train = "pokerl.train:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pokerl"]
