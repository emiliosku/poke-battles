[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pokeengine"
version = "0.1.0"
description = "poke-env wrapper, Showdown protocol parsing, event normalization"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "poke-battles" }]
keywords = ["pokemon", "showdown", "poke-env"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Games/Entertainment",
]

dependencies = [
    "pokecore>=0.1.0",
    "poke-env>=0.15.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pokeengine"]
