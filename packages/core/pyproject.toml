[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pokecore"
version = "0.1.0"
description = "Pure-Python core: type chart, teams, formats, battle state, damage, ratings"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "poke-battles" }]
keywords = ["pokemon", "showdown", "type-chart", "glicko-2"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Games/Entertainment",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pokecore"]
