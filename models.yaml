# models.yaml — agent model registry
# Each entry is a logical name used in the API battle/simulation requests.
# The matching env var (e.g. CEREBRAS_API_KEY) must be set at runtime.

# ── Free-tier models ────────────────────────────────────────────

cerebras/llama3.3-70b:
  provider: cerebras
  model_id: cerebras/llama3.3-70b
  tier: free
  temperature: 0.7
  max_tokens: 1024
  timeout_s: 30
  supports_tools: true
  rate_limit_rpm: 30
  notes: "Fast 70B model, good for random battles"

groq/llama3.3-70b:
  provider: groq
  model_id: groq/llama3.3-70b-versatile
  tier: free
  temperature: 0.7
  max_tokens: 1024
  timeout_s: 30
  supports_tools: true
  rate_limit_rpm: 30
  notes: "Groq Llama 3.3 70B, very fast inference"

gemini/gemini-2.0-flash:
  provider: gemini
  model_id: gemini/gemini-2.0-flash
  tier: free
  temperature: 0.7
  max_tokens: 2048
  timeout_s: 30
  supports_tools: true
  rate_limit_rpm: 30
  notes: "Gemini 2.0 Flash, generous free tier"

# ── OpenRouter (free + paid models) ──────────────────────────────

openrouter/qwen-3-235b:
  provider: openrouter
  model_id: openrouter/qwen/qwen-3-235b-a35b:free
  tier: free
  temperature: 0.7
  max_tokens: 2048
  timeout_s: 60
  supports_tools: true
  rate_limit_rpm: 20
  notes: "Qwen 3 235B via OpenRouter free tier, powerful but slower"

openrouter/deepseek-v3:
  provider: openrouter
  model_id: openrouter/deepseek/deepseek-v3
  tier: paid
  temperature: 0.7
  max_tokens: 2048
  timeout_s: 60
  supports_tools: true
  rate_limit_rpm: 60
  notes: "DeepSeek V3, strong competitive play"

# ── Mock for tests and offline development ──────────────────────

mock/deterministic:
  provider: mock
  model_id: mock/deterministic
  tier: mock
  temperature: 0.0
  max_tokens: 128
  timeout_s: 5
  supports_tools: false
  notes: "Deterministic mock for tests, always picks first move"
