server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /poke-battles/api/ {
        proxy_pass http://poke-battles-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /poke-battles/ws/ {
        proxy_pass http://poke-battles-api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /poke-battles/showdown/ {
        proxy_pass http://poke-battles-showdown-client:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://poke-battles-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://poke-battles-api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /showdown/ {
        proxy_pass http://poke-battles-showdown-client:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback for the Poké Battles UI. The served index.html is
    # never content-hashed, so we send no-cache to force the browser to
    # revalidate on every load — the next deploy's index.html will then
    # pick up the new content-hashed bundle URL. Hashed assets under
    # /poke-battles/assets/ are matched by the regex block below and
    # cached aggressively (immutable, 1y).
    location /poke-battles/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /poke-battles/index.html;
    }

    location ~ "^/poke-battles/assets/" {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /poke-battles {
        return 308 /poke-battles/;
    }

    location / {
        return 308 /poke-battles/;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
