name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
    UV_VERSION: "0.11.21"

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync
        working-directory: .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (mypy strict)
        run: |
          uv run mypy packages/core/src packages/engine/src
          uv run mypy tests

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=pokecore --cov=pokeengine --cov-report=term --cov-report=xml

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-smoke:
    name: Build smoke
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Build wheel + sdist
        run: |
          uv build --package pokecore --wheel --sdist
