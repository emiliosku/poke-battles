name: Build, Push, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  UV_VERSION: "0.11.21"

jobs:
  validate:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Typecheck (mypy strict)
        run: uv run mypy packages/core/src packages/engine/src packages/llm/src packages/api/src
      - name: Test (pytest + coverage)
        run: uv run pytest --cov=pokecore --cov=pokeengine --cov=pokellm --cov=pokeapi --cov-report=term --cov-report=xml --cov-report=html --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: poke-battles-test-results
          path: test-results.xml
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: poke-battles-coverage-html
          path: htmlcov/

  api:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-api:latest

  showdown:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Showdown
        uses: docker/build-push-action@v6
        with:
          context: .
          file: showdown/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-showdown:latest

  deploy:
    needs: [api, showdown]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: SSH into server and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/oci-infra
            docker compose pull poke-battles-api poke-battles-showdown
            docker compose up -d poke-battles-api poke-battles-showdown
            docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile
