name: Build, Push, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  UV_VERSION: "0.11.21"

jobs:
  validate:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint (ruff)
        id: lint
        continue-on-error: true
        run: |
          uv run ruff check --output-format=sarif . > ruff-results.sarif
      - name: Upload ruff SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ruff-results.sarif
      - name: Lint exit code check
        if: steps.lint.outcome != 'success'
        run: |
          echo "Lint failed — see annotations above"
          exit 1
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Typecheck (mypy strict)
        run: uv run mypy packages/core/src packages/engine/src packages/llm/src packages/api/src
      - name: Test (pytest + coverage)
        run: uv run pytest --cov=pokecore --cov=pokeengine --cov=pokellm --cov=pokeapi --cov-report=term --cov-report=xml --cov-report=html --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: poke-battles-test-results
          path: test-results.xml
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: poke-battles-coverage-html
          path: htmlcov/

  api:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-api:latest

  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Test web UI helpers
        working-directory: web
        env:
          # Bake the dev-only /debug/sprites page into the test build
          # so e2e tests can verify it. The Docker production build
          # already sets this in the web job below.
          VITE_ENABLE_DEBUG: "true"
          # Build the test bundle without a base path so the existing
          # e2e tests can keep navigating to "/" and "/teams" directly
          # (Vite preview then serves them at the same URLs). The
          # Docker production build keeps VITE_BASE_PATH=/poke-battles/
          # so the deployed site is served from its subpath.
          VITE_BASE_PATH: "/"
        run: |
          npm ci
          npm run test:unit
          npm run build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-web:latest

  showdown:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Showdown
        uses: docker/build-push-action@v6
        with:
          context: .
          file: showdown/Dockerfile
          # The Showdown server transpiles the full smogon codebase at
          # build time (``node build``), which SIGILLs under QEMU's arm64
          # emulation about 1 in 2 CI runs. It's also the only image that
          # isn't directly consumed by our arm64 service mesh (it
          # bridges the LLM agents), so building for amd64 here is the
          # pragmatic choice. The companion ``showdown-client`` still
          # ships arm64.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-showdown:latest

  showdown-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Showdown client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: showdown-client/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/poke-battles-showdown-client:latest

  deploy:
    needs: [api, web, showdown, showdown-client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: SSH into server and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/oci-infra
            docker compose pull poke-battles-api poke-battles-web poke-battles-showdown poke-battles-showdown-client
            docker compose up -d poke-battles-api poke-battles-web poke-battles-showdown poke-battles-showdown-client
            docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile
